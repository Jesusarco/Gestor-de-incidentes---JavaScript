<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de incidentes</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>
<body>
    <h1>Gestión de Incidencias Técnicas</h1>

    <!-- Ventana Registro -->
    <div id="miVentana" style="display: none;">
        <div>
            <h1>Registro de sesión</h1>
            <form>
                <label>Usuario:</label>
                <input type="text" id="userRegistro" onblur="this.value = this.value.toUpperCase()" required><br><br>
                <label>Contraseña:</label>
                <input type="password" id="passwordRegistro" placeholder="3 letras y 3 números" required>
                <input type="checkbox" id="mostrarReg" onchange="onCheckRegistro(this)">
                <label for="mostrarReg">Mostrar</label><br><br>
                <button type="button" onclick="almacenardatos()">Registrarse</button>
                <button type="button" onclick="cerrarVentana()">Cerrar ventana</button>
            </form>
        </div>
    </div>

    <!-- Ventana Login -->
    <div id="miVentana1" style="display: none;">
        <div>
            <h1>Iniciar sesión</h1>
            <form>
                <label>Usuario:</label>
                <input type="text" id="userLogin" onblur="this.value = this.value.toUpperCase()" required><br><br>
                <label>Contraseña:</label>
                <input type="password" id="passwordLogin" required>
                <input type="checkbox" id="mostrarLogin" onchange="onCheckLogin(this)">
                <label for="mostrarLogin">Mostrar</label><br>
                <small style="font-size: 20px; color: red;">Solo es necesario escribir las letras de tu contraseña (sin números)</small><br><br>
                <button type="button" onclick="iniciarSesion()">Iniciar sesión</button>
                <button type="button" onclick="cerrarVentanaLogin()">Cerrar ventana</button>
            </form>
        </div>
    </div>

    <div>
        <button class="btn-grande btn-azul btn-margen1" onclick="abrirVentana()">Registrar usuario</button>
        <button class="btn-grande btn-azul btn-margen1" onclick="abrirVentanaLogin()">Conectar usuario</button>
    </div>

    <div id="botonesOcultos" style="display: none;">
        <button class="btn-grande btn-margen2" onclick="abrirVentanaIncidencia()">Crear nueva incidencia</button>
        <button class="btn-grande btn-margen2" onclick="borrarIncidencia()">Borrar incidencia</button>
    </div>

    <!-- Ventana Nueva Incidencia -->
    <div id="miVentana2" style="display: none;">
        <div>
            <h1>Nueva incidencia</h1>
            <form id="formularioIncidencia">
                <label>Fecha:</label>
                <input type="date" id="date" required><br><br>
                <label>Descripción:</label>
                <input type="text" id="desciption" required><br><br>
                <label>Tipo:</label>
                <select id="tipoIncidencia" required>
                    <option value="">Selecciona un tipo</option>
                    <option value="telematica">Telemática</option>
                    <option value="presencial">Presencial</option>
                </select><br><br>
                <label>Prioridad:</label>
                <select id="prioridadIncidencia" required>
                    <option value="">Selecciona prioridad</option>
                    <option value="1">1 - Muy baja</option>
                    <option value="2">2 - Baja</option>
                    <option value="3">3 - Media</option>
                    <option value="4">4 - Alta</option>
                    <option value="5">5 - Muy alta</option>
                    <option value="6">6 - Crítica</option>
                </select><br><br>
                <label>Tiempo estimado (minutos):</label>
                <input type="number" id="tiempoEstimado" required><br><br>
                <label>Técnico asignado:</label>
                <select id="tecnicoAsignado" required>
                    <option value="">Selecciona un técnico</option>
                    <option value="Ana García">Ana García</option>
                    <option value="Carlos Martínez">Carlos Martínez</option>
                    <option value="Laura Sánchez">Laura Sánchez</option>
                    <option value="Miguel Torres">Miguel Torres</option>
                    <option value="Sofía Ramírez">Sofía Ramírez</option>
                </select><br><br>
                <button type="button" onclick="crearIncidencia()">Crear incidencia</button>
                <button type="button" onclick="cerrarVentanaIncidencia()">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- Tabla de incidencias -->
    <table>
        <thead>
            <tr><th>Localizador</th><th>Fecha</th><th>Descripción</th><th>Tipo</th><th>Prioridad</th><th>Tiempo (min)</th><th>Técnico asignado</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <!-- Botón Salir (solo visible en sesión) -->
    <div id="btnSalirContainer" class="centrar" style="display: none;">
        <button class="btn-grande btn-margen2" onclick="salirModoAdministrador()">Salir del modo Administrador</button>
    </div>

    <!-- Consulta pública de incidencias (solo sin sesión) -->
    <div id="consultaContainer" style="text-align: center; margin-top: 30px;">
        <h3>Consultar incidencia</h3>
        <label>Localizador (ID): </label>
        <input type="number" id="consultarId" placeholder="Ej: 1, 2, 3...">
        <button onclick="consultarIncidencia()">Consultar</button>
        <div id="resultadoConsulta" style="margin-top: 15px; background: #f0f0f0; padding: 10px; border-radius: 5px;"></div>
    </div>
</body>
</html>
